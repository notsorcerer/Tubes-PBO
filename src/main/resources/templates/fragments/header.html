<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'LiquidPedia'">LiquidPedia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<nav th:fragment="navbar" class="navbar">
    <div class="container navbar-container">
        <a href="/" class="navbar-brand">
            <span class="brand-icon">&#9763;</span>
            <span class="brand-text">Liquid<span class="brand-highlight">Pedia</span></span>
        </a>
        <nav class="navbar-menu">
            <a href="/" class="nav-link">Beranda</a>
            <a href="/products" class="nav-link">Produk</a>
        </nav>
        <div class="navbar-actions">
            <div sec:authorize="isAuthenticated()">
                <a href="/cart" class="cart-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/>
                    </svg>
                </a>
            </div>
            <div sec:authorize="!isAuthenticated()">
                <a href="/login" class="btn btn-outline">Sign In</a>
                <a href="/register" class="btn btn-primary">Sign Up</a>
            </div>
            <div sec:authorize="isAuthenticated()" class="dropdown">
                <button class="dropdown-toggle" onclick="toggleDropdown(event)" style="background:none;border:none;cursor:pointer;">
                    <div class="avatar">
                        <span th:text="${#strings.substring(#authentication.principal.username, 0, 1)}">U</span>
                    </div>
                </button>
                <div class="dropdown-menu">
                    <a href="/profile" class="dropdown-item">Profile</a>
                    <a href="/orders" class="dropdown-item">Riwayat Pesanan</a>
                    <a sec:authorize="hasRole('ADMIN')" href="/admin/dashboard" class="dropdown-item">Admin Panel</a>
                    <hr class="dropdown-divider">
                    <a href="/logout" class="dropdown-item dropdown-item-danger">Logout</a>
                </div>
            </div>
        </div>
        <button class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </button>
    </div>
    <nav class="mobile-menu" id="mobileMenu">
        <a href="/" class="nav-link">Beranda</a>
        <a href="/products" class="nav-link">Produk</a>
        <hr>
        <div sec:authorize="!isAuthenticated()">
            <a href="/login" class="nav-link">Sign In</a>
            <a href="/register" class="nav-link">Sign Up</a>
        </div>
        <div sec:authorize="isAuthenticated()">
            <a href="/cart" class="nav-link">Cart</a>
            <a href="/profile" class="nav-link">Profile</a>
            <a href="/orders" class="nav-link">Riwayat Pesanan</a>
            <a sec:authorize="hasRole('ADMIN')" href="/admin/dashboard" class="nav-link">Admin Panel</a>
            <a href="/logout" class="nav-link">Logout</a>
        </div>
    </nav>
</nav>

<script>
    function toggleDropdown(e) {
        e.stopPropagation();
        var menu = e.currentTarget.nextElementSibling;
        if (menu) menu.classList.toggle('show');
    }
    document.addEventListener('click', function(e) {
        var dropdown = document.querySelector('.dropdown');
        if (dropdown && !dropdown.contains(e.target)) {
            var menu = dropdown.querySelector('.dropdown-menu');
            if (menu) menu.classList.remove('show');
        }
    });
</script>
</html>
