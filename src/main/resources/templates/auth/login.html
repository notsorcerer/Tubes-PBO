<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="id">
<head th:replace="~{fragments/header :: head('Sign In - LiquidPedia')}">
    <title>Sign In - LiquidPedia</title>
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="auth-page">
        <div class="auth-card">
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to your LiquidPedia account</p>

            <div th:if="${param.error}" style="background:#dc3545;color:white;padding:12px 16px;border-radius:var(--radius);margin-bottom:20px;font-size:0.9rem;">
                Email atau password salah
            </div>
            <div th:if="${param.logout}" style="background:#28a745;color:white;padding:12px 16px;border-radius:var(--radius);margin-bottom:20px;font-size:0.9rem;">
                Anda telah logout
            </div>

            <form method="post" th:action="@{/login}">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="username" class="form-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="padding:14px;">Sign In</button>
            </form>

            <p class="auth-link">
                Belum punya akun? <a href="/register">Sign Up</a>
            </p>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        document.getElementById('hamburger').addEventListener('click', function() {
            document.getElementById('mobileMenu').classList.toggle('active');
        });
    </script>
</body>
</html>
