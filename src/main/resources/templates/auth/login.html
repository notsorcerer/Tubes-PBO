<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="id">
<head th:replace="~{fragments/header :: head('Masuk - LiquidPedia')}">
    <title>Masuk - LiquidPedia</title>
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="auth-page">
        <div class="auth-card">
            <h1>Masuk</h1>
            <p class="subtitle">Masuk ke akun LiquidPedia kamu</p>

            <div th:if="${param.error}" class="form-error" style="background:#dc3545;color:white;padding:12px 16px;border-radius:var(--radius-lg);margin-bottom:20px;text-align:center;">
                Email atau password salah
            </div>
            <div th:if="${param.logout}" class="form-error" style="background:#22c55e;color:white;padding:12px 16px;border-radius:var(--radius-lg);margin-bottom:20px;text-align:center;">
                Anda telah logout
            </div>

            <form method="post" th:action="@{/login}">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="username" class="form-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="padding:14px;">Masuk</button>
            </form>

            <p class="auth-link">
                Belum punya akun? <a href="/register">Daftar</a>
            </p>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
