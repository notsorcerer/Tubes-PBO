<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="id">
<head th:replace="~{fragments/header :: head('Sign Up - LiquidPedia')}">
    <title>Sign Up - LiquidPedia</title>
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="auth-page">
        <div class="auth-card">
            <h1>Create Account</h1>
            <p class="subtitle">Join LiquidPedia and start shopping</p>

            <form method="post" th:action="@{/register}" th:object="${registerDto}">
                <div class="form-group">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" th:field="*{name}" class="form-input" placeholder="Nama kamu">
                    <div class="form-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-input" placeholder="your@email.com">
                    <div class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">No. Telepon</label>
                    <input type="text" th:field="*{phone}" class="form-input" placeholder="08123456789">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" th:field="*{password}" class="form-input" placeholder="Min. 6 karakter">
                    <div class="form-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Konfirmasi Password</label>
                    <input type="password" th:field="*{confirmPassword}" class="form-input" placeholder="Ulangi password">
                    <div class="form-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="padding:14px;">Sign Up</button>
            </form>

            <p class="auth-link">
                Sudah punya akun? <a href="/login">Sign In</a>
            </p>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        document.getElementById('hamburger').addEventListener('click', function() {
            document.getElementById('mobileMenu').classList.toggle('active');
        });
    </script>
</body>
</html>
