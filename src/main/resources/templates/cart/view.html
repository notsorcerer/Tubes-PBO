<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="id">
<head th:replace="~{fragments/header :: head('Cart - LiquidPedia')}">
    <title>Cart - LiquidPedia</title>
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <section class="section">
        <div class="container">
            <h2 style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:24px;">Shopping Cart</h2>

            <div th:if="${#lists.isEmpty(cart.cartItems)}" style="text-align:center;padding:60px 0;">
                <p style="font-size:3rem;margin-bottom:16px;">&#128722;</p>
                <p style="font-size:1.2rem;color:var(--text-light);margin-bottom:24px;">Cart kamu masih kosong</p>
                <a href="/products" class="btn btn-primary">Belanja Sekarang</a>
            </div>

            <div th:unless="${#lists.isEmpty(cart.cartItems)}">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Produk</th>
                            <th>Harga</th>
                            <th>Jumlah</th>
                            <th>Subtotal</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cart.cartItems}">
                            <td style="display:flex;align-items:center;gap:12px;">
                                <img th:if="${item.produk.imageUrl}" th:src="${item.produk.imageUrl}" alt="" class="cart-item-image">
                                <div th:unless="${item.produk.imageUrl}" style="width:64px;height:64px;background:var(--gray-200);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;">
                                    <span>&#9881;</span>
                                </div>
                                <div>
                                    <strong th:text="${item.produk.nameProduk}">Nama</strong>
                                </div>
                            </td>
                            <td>Rp<span th:text="${item.produk.price}">150000</span></td>
                            <td>
                                <form th:action="@{/cart/update/{id}(id=${item.idCartItem})}" method="post" style="display:flex;align-items:center;gap:8px;">
                                    <input type="number" name="qty" th:value="${item.qty}" min="1" style="width:60px;padding:6px;border:1px solid var(--gray-300);border-radius:4px;text-align:center;">
                                    <button type="submit" class="btn btn-sm btn-secondary">Update</button>
                                </form>
                            </td>
                            <td><strong>Rp<span th:text="${item.subTotal}">150000</span></strong></td>
                            <td>
                                <form th:action="@{/cart/remove/{id}(id=${item.idCartItem})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-danger">Hapus</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <div class="cart-summary">
                    <form method="post" th:action="@{/cart/apply-voucher}" class="voucher-input">
                        <input type="text" name="kodeVoucher" class="form-input" placeholder="Masukkan kode voucher" style="flex:1;">
                        <button type="submit" class="btn btn-secondary">Terapkan</button>
                    </form>
                    <div th:if="${voucherError}" style="color:#dc3545;font-size:0.9rem;margin-bottom:12px;" th:text="${voucherError}">Error</div>
                    <div th:if="${voucher}" style="color:#28a745;font-size:0.9rem;margin-bottom:12px;">
                        Voucher <strong th:text="${voucher.kodeVoucher}">KODE</strong> diterapkan! Diskon <span th:text="${voucher.discount * 100}">10</span>%
                    </div>

                    <div class="cart-summary-row">
                        <span>Subtotal</span>
                        <span>Rp<span th:text="${cart.totalPrice}">150000</span></span>
                    </div>
                    <div class="cart-summary-row" th:if="${discount}" style="color:#28a745;">
                        <span>Diskon Voucher</span>
                        <span>-Rp<span th:text="${discount}">15000</span></span>
                    </div>
                    <div class="cart-summary-row total">
                        <span>Total</span>
                        <span th:if="${totalAfterDiscount}">Rp<span th:text="${totalAfterDiscount}">135000</span></span>
                        <span th:unless="${totalAfterDiscount}">Rp<span th:text="${cart.totalPrice}">150000</span></span>
                    </div>
                    <a th:href="@{/checkout(voucherCode=${voucher?.kodeVoucher})}" class="btn btn-primary btn-block" style="margin-top:16px;">Checkout</a>
                </div>
            </div>
        </div>
    </section>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        document.getElementById('hamburger').addEventListener('click', function() {
            document.getElementById('mobileMenu').classList.toggle('active');
        });
        document.addEventListener('click', function(e) {
            var dropdown = document.querySelector('.dropdown');
            if (dropdown && !dropdown.contains(e.target)) {
                var menu = dropdown.querySelector('.dropdown-menu');
                if (menu) menu.classList.remove('show');
            }
        });
        var toggle = document.querySelector('.dropdown-toggle');
        if (toggle) {
            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                var menu = this.nextElementSibling;
                if (menu) menu.classList.toggle('show');
            });
        }
        setTimeout(function() {
            document.querySelectorAll('.alert').forEach(function(el) {
                el.style.opacity = '0';
                setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
            });
        }, 5000);
    </script>
</body>
</html>
