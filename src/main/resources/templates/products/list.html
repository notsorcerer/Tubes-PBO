<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="id">
<head th:replace="~{fragments/header :: head('Produk - LiquidPedia')}">
    <title>Produk - LiquidPedia</title>
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <section class="section">
        <div class="container">
            <div class="section-header">
                <h2>Semua Produk</h2>
                <p th:if="${search}" style="color:var(--text-light);">Hasil pencarian untuk "<strong style="color:var(--primary);" th:text="${search}">keyword</strong>"</p>
                <p th:unless="${search}">Temukan liquid dan device favoritmu</p>
            </div>

            <!-- Search hint -->
            <div th:if="${search}" class="search-hint">
                <span>Menampilkan hasil untuk <strong th:text="${search}">keyword</strong></span>
                <a href="/products" class="clear-btn">&#10005; Hapus filter</a>
            </div>

            <!-- Filter bar -->
            <div class="filter-bar">
                <span class="filter-bar-label">Kategori:</span>
                <a href="/products" th:classappend="${selectedCategory == null and search == null} ? 'filter-btn active' : 'filter-btn'" class="filter-btn">Semua</a>
                <a th:each="cat : ${categories}"
                   th:href="@{/products(category=${cat.idCategory}, search=${search})}"
                   th:classappend="${selectedCategory == cat.idCategory} ? 'filter-btn active' : 'filter-btn'"
                   class="filter-btn"
                   th:text="${cat.categoryName}">Kategori</a>
            </div>

            <div class="produk-grid" th:if="${not #lists.isEmpty(produks)}">
                <div class="produk-card" th:each="produk : ${produks}">
                    <img th:if="${produk.imageUrl}" th:src="${produk.imageUrl}" alt="" class="produk-card-image">
                    <div th:unless="${produk.imageUrl}" class="produk-card-image">
                        <img src="/img/placeholder.svg" alt="No image" style="width:100%;height:100%;object-fit:cover;">
                    </div>
                    <div class="produk-card-body">
                        <span class="category-label" th:text="${produk.category?.categoryName}">Kategori</span>
                        <div class="badge-group">
                            <span class="badge badge-primary" th:if="${produk.isBestSeller}">Best Seller</span>
                            <span class="badge badge-accent" th:if="${produk.isNewArrival}">New</span>
                        </div>
                        <h3 th:text="${produk.nameProduk}">Nama Produk</h3>
                        <div class="price">Rp<span th:text="${produk.price}">150000</span></div>
                        <a th:href="@{/products/{id}(id=${produk.idProduk})}" class="btn btn-outline btn-block btn-sm" style="border-color:var(--primary);color:var(--primary);margin-bottom:8px;">Detail</a>
                        <form th:action="@{/cart/add/{id}(id=${produk.idProduk})}" method="post" sec:authorize="isAuthenticated()">
                            <input type="hidden" name="qty" value="1">
                            <button type="submit" class="btn btn-primary btn-block btn-sm">Tambah ke Cart</button>
                        </form>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(produks)}" style="text-align:center;padding:60px 0;">
                <p style="font-size:1.2rem;color:var(--text-light);">Tidak ada produk ditemukan</p>
                <a th:if="${search}" href="/products" class="btn btn-primary" style="margin-top:16px;">Lihat Semua Produk</a>
            </div>

            <div class="pagination" th:if="${totalPages > 1}">
                <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                   th:href="@{/products(category=${selectedCategory}, search=${search}, page=${i})}"
                   th:classappend="${i == currentPage} ? 'page-link active' : 'page-link'"
                   class="page-link"
                   th:text="${i + 1}">1</a>
            </div>
        </div>
    </section>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
