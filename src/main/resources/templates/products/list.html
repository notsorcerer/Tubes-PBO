<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="id">
<head th:replace="~{fragments/header :: head('Produk - LiquidPedia')}">
    <title>Produk - LiquidPedia</title>
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <section class="section">
        <div class="container">
            <div class="section-header">
                <h2>Semua Produk</h2>
                <p>Temukan liquid dan device favoritmu</p>
            </div>

            <div class="filter-bar">
                <span style="font-weight:600;">Kategori:</span>
                <a href="/products" th:classappend="${selectedCategory == null} ? 'filter-btn active' : 'filter-btn'" class="filter-btn">Semua</a>
                <a th:each="cat : ${categories}" th:href="@{/products(category=${cat.idCategory})}" th:classappend="${selectedCategory == cat.idCategory} ? 'filter-btn active' : 'filter-btn'" class="filter-btn" th:text="${cat.categoryName}">Kategori</a>
            </div>

            <div class="produk-grid" th:if="${not #lists.isEmpty(produks)}">
                <div class="produk-card" th:each="produk : ${produks}">
                    <img th:if="${produk.imageUrl}" th:src="${produk.imageUrl}" alt="" class="produk-card-image">
                    <div th:unless="${produk.imageUrl}" class="produk-card-image">
                        <span>&#9881;</span>
                    </div>
                    <div class="produk-card-body">
                        <div class="badge-group">
                            <span class="badge badge-primary" th:if="${produk.isBestSeller}">Best Seller</span>
                            <span class="badge badge-accent" th:if="${produk.isNewArrival}">New</span>
                        </div>
                        <h3 th:text="${produk.nameProduk}">Nama Produk</h3>
                        <div class="price">Rp<span th:text="${produk.price}">150000</span></div>
                        <a th:href="@{/products/{id}(id=${produk.idProduk})}" class="btn btn-outline btn-block btn-sm" style="border-color:var(--primary);color:var(--primary);margin-bottom:8px;">Detail</a>
                        <form th:action="@{/cart/add/{id}(id=${produk.idProduk})}" method="post" sec:authorize="isAuthenticated()">
                            <input type="hidden" name="qty" value="1">
                            <button type="submit" class="btn btn-primary btn-block btn-sm">Tambah ke Cart</button>
                        </form>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(produks)}" style="text-align:center;padding:60px 0;">
                <p style="font-size:1.2rem;color:var(--text-light);">Tidak ada produk ditemukan</p>
            </div>

            <div class="pagination" th:if="${totalPages > 1}">
                <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                   th:href="@{/products(category=${selectedCategory}, page=${i})}"
                   th:classappend="${i == currentPage} ? 'page-link active' : 'page-link'"
                   class="page-link"
                   th:text="${i + 1}">1</a>
            </div>
        </div>
    </section>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        document.getElementById('hamburger').addEventListener('click', function() {
            document.getElementById('mobileMenu').classList.toggle('active');
        });
        document.addEventListener('click', function(e) {
            var dropdown = document.querySelector('.dropdown');
            if (dropdown && !dropdown.contains(e.target)) {
                var menu = dropdown.querySelector('.dropdown-menu');
                if (menu) menu.classList.remove('show');
            }
        });
        var toggle = document.querySelector('.dropdown-toggle');
        if (toggle) {
            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                var menu = this.nextElementSibling;
                if (menu) menu.classList.toggle('show');
            });
        }
        setTimeout(function() {
            document.querySelectorAll('.alert').forEach(function(el) {
                el.style.opacity = '0';
                setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
            });
        }, 5000);
    </script>
</body>
</html>
