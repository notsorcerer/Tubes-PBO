<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="id"
      th:with="content=~{::content}">
<head th:replace="~{admin/layout/adminLayout :: head('Produk - LiquidPedia Admin')}">
    <title>Produk - LiquidPedia Admin</title>
</head>
<body th:replace="~{admin/layout/adminLayout :: layout}">
<th:block th:fragment="content">
    <div class="admin-toolbar">
        <h2 style="font-family:'Syne',sans-serif;font-weight:700;">Manajemen Produk</h2>
        <a href="/admin/products/create" class="btn btn-primary">
            <i class="ti ti-plus"></i> Tambah Produk
        </a>
    </div>

    <div class="admin-table-wrapper">
        <table class="admin-table">
            <thead>
                <tr>
                    <th style="width:80px;">Gambar</th>
                    <th>Nama Produk</th>
                    <th>Kategori</th>
                    <th>Harga</th>
                    <th>Stok</th>
                    <th>Best Seller</th>
                    <th>New Arrival</th>
                    <th style="width:140px;">Aksi</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${produks}">
                    <td>
                        <img th:if="${p.imageUrl}" th:src="${p.imageUrl}"
                             style="width:60px;height:60px;object-fit:cover;border-radius:6px;background:var(--gray-200);"
                             alt="thumbnail">
                        <div th:unless="${p.imageUrl}"
                             style="width:60px;height:60px;border-radius:6px;background:var(--gray-200);display:flex;align-items:center;justify-content:center;color:var(--gray-400);font-size:1.5rem;">
                            <i class="ti ti-photo-off"></i>
                        </div>
                    </td>
                    <td><strong th:text="${p.nameProduk}">Nama</strong></td>
                    <td><span class="admin-badge admin-badge-secondary" th:text="${p.category?.categoryName}">Kategori</span></td>
                    <td class="admin-price">Rp <span th:text="${p.price}">0</span></td>
                    <td><span th:text="${p.stock}">0</span></td>
                    <td>
                        <span th:if="${p.isBestSeller}" class="admin-badge admin-badge-success">Best Seller</span>
                        <span th:unless="${p.isBestSeller}" class="admin-badge admin-badge-gray">-</span>
                    </td>
                    <td>
                        <span th:if="${p.isNewArrival}" class="admin-badge admin-badge-info">New</span>
                        <span th:unless="${p.isNewArrival}" class="admin-badge admin-badge-gray">-</span>
                    </td>
                    <td>
                        <div style="display:flex;gap:6px;">
                            <a th:href="@{/admin/products/{id}/edit(id=${p.idProduk})}" class="btn btn-sm btn-secondary" style="padding:6px 12px;">
                                <i class="ti ti-edit" style="font-size:0.85rem;"></i> Edit
                            </a>
                            <form method="post" th:action="@{/admin/products/{id}/delete(id=${p.idProduk})}"
                                  style="display:inline;" onsubmit="return confirmDelete(event, 'Yakin ingin menghapus produk ini?')">
                                <button type="submit" class="btn btn-sm btn-danger" style="padding:6px 12px;">
                                    <i class="ti ti-trash" style="font-size:0.85rem;"></i> Hapus
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(produks)}">
                    <td colspan="8" style="text-align:center;padding:48px;color:var(--text-light);">
                        <i class="ti ti-package-off" style="font-size:2rem;display:block;margin-bottom:12px;"></i>
                        Belum ada produk
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        function confirmDelete(event, message) {
            if (!confirm(message)) {
                event.preventDefault();
                return false;
            }
            return true;
        }
    </script>
</th:block>
</html>
