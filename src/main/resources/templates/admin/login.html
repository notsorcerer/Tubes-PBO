<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="id">
<head th:replace="~{admin/layout/adminLayout :: head('Admin Login - LiquidPedia')}">
    <title>Admin Login - LiquidPedia</title>
</head>
<body>
<div class="admin-login-page">
    <div class="admin-login-card">
        <div class="admin-login-logo">
            <span class="brand-icon">&#9763;</span>
            <span class="admin-logo-text">Liquid<span class="brand-highlight">Pedia</span></span>
        </div>
        <h1>Admin Panel</h1>
        <p class="admin-login-subtitle">Masuk untuk mengelola toko</p>

        <div th:if="${param.error}" class="admin-login-error">
            Email atau password salah
        </div>
        <div th:if="${param.logout}" class="admin-login-info">
            Anda telah logout
        </div>

        <form method="post" th:action="@{/admin/login}">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="username" class="form-input" placeholder="admin@liquidpedia.com" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="padding:14px;">Masuk</button>
        </form>

        <a href="/" class="admin-login-back">&larr; Kembali ke Toko</a>
    </div>
</div>

<style>
    .admin-login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 100%);
        padding: 20px;
    }
    .admin-login-card {
        background: var(--white);
        padding: 48px;
        border-radius: var(--radius-xl);
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        width: 100%;
        max-width: 420px;
        text-align: center;
    }
    .admin-login-logo {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
    .admin-login-card h1 {
        font-size: 1.6rem;
        margin-bottom: 4px;
    }
    .admin-login-subtitle {
        color: var(--text-light);
        margin-bottom: 32px;
        font-size: 0.9rem;
    }
    .admin-login-error, .admin-login-info {
        padding: 12px 16px;
        border-radius: var(--radius);
        margin-bottom: 20px;
        font-size: 0.9rem;
        text-align: center;
    }
    .admin-login-error { background: #dc3545; color: white; }
    .admin-login-info { background: #28a745; color: white; }
    .admin-login-back {
        display: block;
        margin-top: 20px;
        color: var(--text-light);
        font-size: 0.9rem;
        transition: var(--transition);
    }
    .admin-login-back:hover { color: var(--primary); text-decoration: underline; }
</style>
</body>
</html>
