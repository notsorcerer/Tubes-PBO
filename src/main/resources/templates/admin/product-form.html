<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      lang="id"
      th:with="content=~{::content}">
<head th:replace="~{admin/layout/adminLayout :: head('Form Produk - LiquidPedia Admin')}">
    <title>Form Produk - LiquidPedia Admin</title>
</head>
<body th:replace="~{admin/layout/adminLayout :: layout}">
<th:block th:fragment="content">
    <div class="admin-toolbar">
        <h2 style="font-weight:700;" th:text="${produkDto.id != null} ? 'Edit Produk' : 'Tambah Produk'">
            Form Produk
        </h2>
        <a href="/admin/products" class="btn btn-outline" style="border-color:var(--gray-300);color:var(--text);">
            <i class="ti ti-arrow-left"></i> Kembali
        </a>
    </div>

    <div class="admin-card">
        <form method="post" th:action="${produkDto.id != null} ? @{/admin/products/{id}/edit(id=${produkDto.id})} : @{/admin/products/create}"
              enctype="multipart/form-data" class="admin-form">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                <div class="form-group">
                    <label class="form-label">Nama Produk</label>
                    <input type="text" name="nameProduk" class="form-input" th:value="${produkDto.nameProduk}"
                           placeholder="Masukkan nama produk">
                    <div th:if="${#fields.hasErrors('nameProduk')}" th:errors="*{nameProduk}" class="form-error"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Kategori</label>
                    <select name="categoryId" class="form-select" required>
                        <option value="">Pilih Kategori</option>
                        <option th:each="cat : ${categories}" th:value="${cat.idCategory}"
                                th:text="${cat.categoryName}"
                                th:selected="${produkDto.categoryId == cat.idCategory}">Kategori</option>
                    </select>
                    <div th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}" class="form-error"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Harga (Rp)</label>
                    <input type="number" name="price" class="form-input" th:value="${produkDto.price}"
                           step="0.01" min="1000" placeholder="Masukkan harga">
                    <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="form-error"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Stok</label>
                    <input type="number" name="stock" class="form-input" th:value="${produkDto.stock}"
                           min="0" placeholder="Masukkan jumlah stok">
                    <div th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}" class="form-error"></div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Deskripsi</label>
                <textarea name="deskripsi" class="form-textarea" placeholder="Masukkan deskripsi produk" th:text="${produkDto.deskripsi}"></textarea>
                <div th:if="${#fields.hasErrors('deskripsi')}" th:errors="*{deskripsi}" class="form-error"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Gambar Produk</label>
                <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
                    <input type="file" name="imageFile" class="form-input" accept="image/jpeg,image/png"
                           style="flex:1;min-width:200px;"
                           onchange="previewImage(event)">
                    <small style="color:var(--text-light);">Format: JPEG/PNG, Maks: 5MB</small>
                </div>
                <div th:if="${existingImage}" style="margin-top:12px;">
                    <img th:src="${existingImage}" style="width:120px;height:120px;object-fit:cover;border-radius:var(--radius);border:1px solid var(--gray-200);">
                    <small style="display:block;color:var(--text-light);margin-top:4px;">Gambar saat ini. Upload gambar baru untuk mengganti.</small>
                </div>
                <div id="imagePreview" style="margin-top:12px;display:none;">
                    <img id="previewImg" style="width:120px;height:120px;object-fit:cover;border-radius:var(--radius);border:1px solid var(--gray-200);">
                </div>
            </div>

            <div style="display:flex;gap:24px;margin:24px 0;">
                <label class="form-check">
                    <input type="checkbox" name="isBestSeller" value="true" th:checked="${produkDto.isBestSeller}">
                    <span>Best Seller</span>
                </label>
                <label class="form-check">
                    <input type="checkbox" name="isNewArrival" value="true" th:checked="${produkDto.isNewArrival}">
                    <span>New Arrival</span>
                </label>
            </div>

            <div style="display:flex;gap:12px;padding-top:20px;border-top:1px solid var(--gray-200);">
                <button type="submit" class="btn btn-primary" style="padding:12px 32px;">
                    <i class="ti ti-device-floppy"></i> Simpan
                </button>
                <a href="/admin/products" class="btn btn-outline" style="border-color:var(--gray-300);color:var(--text);">Batal</a>
            </div>
        </form>
    </div>

    <script>
        function previewImage(event) {
            var reader = new FileReader();
            reader.onload = function() {
                var output = document.getElementById('previewImg');
                output.src = reader.result;
                document.getElementById('imagePreview').style.display = 'block';
            };
            if (event.target.files[0]) {
                reader.readAsDataURL(event.target.files[0]);
            }
        }
    </script>
</th:block>
</html>
