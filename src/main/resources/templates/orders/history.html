<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="id">
<head th:replace="~{fragments/header :: head('Riwayat Pesanan - LiquidPedia')}">
    <title>Riwayat Pesanan - LiquidPedia</title>
</head>
<body>
    <div th:replace="~{fragments/header :: navbar}"></div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <section class="section">
        <div class="container">
            <h2 style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:24px;">Riwayat Pesanan</h2>

            <div th:if="${#lists.isEmpty(orders)}" style="text-align:center;padding:60px 0;">
                <p style="font-size:3rem;margin-bottom:16px;">&#128230;</p>
                <p style="font-size:1.2rem;color:var(--text-light);margin-bottom:24px;">Belum ada pesanan</p>
                <a href="/products" class="btn btn-primary">Mulai Belanja</a>
            </div>

            <div th:each="order : ${orders}" class="order-card">
                <div class="order-header">
                    <div>
                        <span class="order-id">Order #<span th:text="${order.idOrder}">001</span></span>
                        <span style="color:var(--text-light);font-size:0.9rem;margin-left:16px;" th:text="${order.orderDate}">01 Jan 2026</span>
                    </div>
                    <span th:classappend="${order.status.name() == 'PENDING'} ? 'badge badge-warning' : 
                                        ${order.status.name() == 'PROCESSING'} ? 'badge badge-primary' :
                                        ${order.status.name() == 'SHIPPED'} ? 'badge badge-accent' :
                                        ${order.status.name() == 'DELIVERED'} ? 'badge badge-success' :
                                        'badge'" class="badge" th:text="${order.status.name()}">STATUS</span>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <span style="font-weight:700;font-size:1.1rem;">Total: Rp<span th:text="${order.totalPrice}">150000</span></span>
                    <a th:href="@{/orders/{id}(id=${order.idOrder})}" class="btn btn-secondary btn-sm">Detail</a>
                </div>
            </div>
        </div>
    </section>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        document.getElementById('hamburger').addEventListener('click', function() {
            document.getElementById('mobileMenu').classList.toggle('active');
        });
        document.addEventListener('click', function(e) {
            var dropdown = document.querySelector('.dropdown');
            if (dropdown && !dropdown.contains(e.target)) {
                var menu = dropdown.querySelector('.dropdown-menu');
                if (menu) menu.classList.remove('show');
            }
        });
        var toggle = document.querySelector('.dropdown-toggle');
        if (toggle) {
            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                var menu = this.nextElementSibling;
                if (menu) menu.classList.toggle('show');
            });
        }
        setTimeout(function() {
            document.querySelectorAll('.alert').forEach(function(el) {
                el.style.opacity = '0';
                setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
            });
        }, 5000);
    </script>
</body>
</html>
